# ══════════════════════════════════════════════════════════════
# render.yaml - Configuración de Render.com
# ══════════════════════════════════════════════════════════════

services:
  # ═══ Backend Spring Boot ═══
  - type: web
    name: insertic-api
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    
    healthCheckPath: /api/health

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      - key: DATABASE_URL
        fromDatabase:
          name: insertic-db
          property: connectionString

      - key: SERVER_URL
        value: https://insertic-api.onrender.com

      - key: TZ
        value: America/Bogota

      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m

databases:
  # ═══ PostgreSQL Database ═══
  - name: insertic-db
    plan: free
    databaseName: insertic_db
    user: insertic_user
    region: oregon
    ipAllowList: []