# ══════════════════════════════════════════════════════════════
# APPLICATION.YML - Configuración Base
# ══════════════════════════════════════════════════════════════

spring:
  application:
    name: insertic-api
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # ═══ JPA / Hibernate ═══
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: America/Bogota
        types:
          print:
            banner: false
    show-sql: false
  
  # ═══ Flyway Migrations ═══
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

# ═══ Server Configuration ═══
server:
  port: ${PORT:8080}
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

# ═══ Management / Actuator ═══
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# ═══ OpenAPI / Swagger ═══
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: true

# ═══ Logging ═══
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  level:
    root: INFO
    com.insertic: INFO
    org.springframework.web: INFO
    org.hibernate: WARN

# ═══ CORS Configuration ═══
cors:
  allowed-origins: http://localhost:4200,https://inserticsas.netlify.app